name: Lint and Test

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x

      - uses: pnpm/action-setup@v3
        name: Install pnpm and dependencies
        id: pnpm-install
        with:
          version: 7
          run_install: true

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
